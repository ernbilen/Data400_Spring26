### Overview

**Research Question:**
Are copper and silver entering a structurally tighter regime?

**Thesis:**
Copper and silver are not just reacting to normal commodity cycles. The evidence points to tighter physical availability, and Monte Carlo is a better way to show that uncertainty over long time horizons.

**Our Project:**
1. Historical metals panel
2. Copper and silver physical evidence
3. Scenario and Monte Carlo model

### Result 2: silver is a hybrid metal

&lt;img src="https://raw.githubusercontent.com/ameliakim/Data400_Spring26/main/ppt%20images/pic2.png" width="60%" /&gt;

Silver is not purely precious or purely industrial. Its correlation with gold is high, but it also has
meaningful co-movement with industrial metals such as copper.

- **0.74 silver-gold return correlation**
- **0.48 silver-copper return correlation**
---

###Result 3: the dollar is the strongest common macro driver

&lt;img src="https://raw.githubusercontent.com/ameliakim/Data400_Spring26/main/ppt%20images/pic3.png" width="80%" /&gt;


The broad U.S. dollar enters negatively across all six metal regressions. This means a bullish metals thesis is incomplete if it ignores currency conditions.

### Results

&lt;img src="https://raw.githubusercontent.com/ameliakim/Data400_Spring26/main/ppt%20images/fig14.png" width="60%" /&gt;

**Interpretation:**
- Copper shows a steadier tightening story: demand growth and inventory scarcity point in the same direction.
- Silver shows a wider distribution: the upside case is stronger,but substitution and investor behavior add uncertainty.
- The model supports upward pressure under stated assumptions, not a guaranteed price target.

**The safest conclusion is not “prices must reach X.” The conclusion is that sustained deficits and reduced availability create asymmetric upside risk.**

---

###Final Takeaways
- Metal prices are shaped by both macro forces and physical-market scarcity.
- Copper and silver deserve deeper treatment because their structural stories are different from the rest of the panel.
- Monte Carlo is the right final model because it makes uncertainty visible and keeps assumptions transparent.
