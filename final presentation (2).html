# Seeking Alpha Through
# Optimal Asset Allocation

## Across Market Environments and Alternative Data

### Thanh Vu & Noah Lope | DATA 400 | 2026

---

# Overview

**Goal**
* Determine the optimal asset allocation across equities, bonds, gold, and real estate under four primary market environments.
* Compare a regime-aware portfolio against a simple equal-weighted benchmark over 50 years (1976–2025).

**The Four Primary Market Regimes**
* Rising Growth / Rising Inflation - *The Expansion*
* Rising Growth / Falling Inflation - *The Goldilocks*
* Falling Growth / Rising Inflation - *The Stagflation*
* Falling Growth / Falling Inflation - *The Deflationary Bust*

**Core Question**
* Does adjusting portfolio weights based on the economic regime improve long-term returns and reduce downside risk compared to holding the same weights all the time?

---

# Tractable Data (1976–2025)

**Asset Classes**
* **Equities:** S&P 500 index to measure stock market performance
* **Bonds:** U.S. Treasury yields, 2-year and 10-year, to approximate bond returns
* **Commodities:** Gold prices (GLD) to capture commodity performance
* **Real Estate:** House Price Index (HPI)

**Macroeconomic Indicators**
* **Inflation:** CPI (Consumer Price Index) for measuring price changes
* **Growth Proxy:** INDPRO (Industrial Production Index) as a proxy for GDP growth

**Data Sources**
* Equities: Investing.com
* Bonds, HPI, CPI, INDPRO: Federal Reserve Economic Data (FRED) - via API key
* Gold (GLD): Macrotrend

---

# Key Findings - Regime 1: The Expansion

**Rising Growth / Rising Inflation** - Occurred 37 times (74% of all periods). This is the “Standard” state of the U.S. economy.

| Asset | Avg. Return | Win Rate |
|:------|------------:|---------:|
| S&P 500 | 11.72% | 78.4% |
| Gold | 13.95% | 59.5% |
| Real Estate | 5.45% | 88.9% |

**Why these assets win**
* **S&P 500:** Corporate earnings grow alongside the economy. Companies with pricing power pass costs to consumers, keeping margins healthy.
* **Gold:** Investors buy gold as a hedge against the eroding purchasing power of the dollar that accompanies rising inflation.
* **Real Estate:** Higher demand for housing and the ability to raise rents make this the most consistent winner - 88.9% win rate.

---

# Key Findings - Regime 2: The Stagflation

**Falling Growth / Rising Inflation** - Occurred 11 times. The economy slows but prices keep climbing.

| Asset | Avg. Return | Win Rate |
|:------|------------:|---------:|
| 2-Year Bond | 7.70% | 90.9% |
| Real Estate | 5.02% | 100% |
| 10-Year Bond | 7.95% | 63.6% |

**Why these assets win**
* **Real Estate:** Acts as a “hard asset” retaining value during inflation, while essential housing demand holds even as growth slows. 100% win rate.
* **2-Year Bonds:** When growth falls, investors seek safety. Short-term bonds are less volatile and allowed re-investment at higher rates as 70s/80s inflation persisted.
* **10-Year Bonds:** Existing long bonds still earn attractive nominal yields in a high-inflation world.

---
class: top, left

# Key Findings - Regime 3: The Deflationary Bust

**Falling Growth / Falling Inflation** - Occurred in 2008 (Global Financial Crisis). The most dangerous regime for investors.

**10-Year Bonds - The “Ultimate Insurance”**
* When growth and inflation both crash, the Federal Reserve aggressively cuts interest rates.
* Because bond prices move opposite to rates, long-term bonds see massive price surges.
* This is the single best-performing asset class in this scenario.

**Equities - Why Stocks Fail**
* Falling growth destroys corporate earnings.
* Falling inflation signals a collapse in consumer demand.
* Together they trigger a “liquidation” event where investors sell stocks at any price to raise cash, as seen throughout 2008–2009.

---
class: top, left

# Key Findings - Regime 4: The Goldilocks

**Rising Growth / Falling Inflation** - Occurred in 1986. The “Best of All Worlds” for financial markets.

**S&P 500 - The Growth Engine**
* Growth is healthy for corporate earnings, but the lack of inflation means the Fed doesn’t need to raise rates.
* This creates “cheap money” for companies to borrow, expand, and invest - driving stock prices higher.

**10-Year Bonds - Double Benefit**
* As inflation falls, the “real yield” of existing bonds becomes more attractive.
* Markets also anticipate lower future interest rates, driving bond prices up *alongside* equities.
* Both major asset classes rally simultaneously - the rarest and most profitable environment.

---

# Portfolio Comparison Back-Test

**Does changing asset weights by the economic regime improve long-term returns and downside risk?**

**Setup**
* Initial Investment: $1,000 - compounded annually
* Back-test period: 50 years with yearly regime classification
* Asset Classes: Stocks (S&P 500), Bonds (2yr & 10yr), Gold, Real Estate (HPI)

Assuming we know next year’s macroeconomic regime, we adjust the portfolio allocation based on which asset classes have historically performed best in that environment.

**Two strategies tested**
1. **Equal-Weighted Portfolio** - 20% in each asset class, no timing or macro view, simple transparent benchmark
2. **Regime-Aware Portfolio** - weights change by yearly regime, tilts toward assets that historically fit each environment

---
class: top, left

# Two Strategies Tested

Each strategy starts with the same $1,000 and is evaluated over the same 50-year sample.

**1. Equal Weight Portfolio - The Benchmark**
* 20% in each asset class
* No timing or macro view - simple transparent benchmark
* Rebalanced annually to equal weights
* **Final value: $32,802 - 7.23% CAGR**

**2. Regime-Aware Portfolio - The Active Strategy**
* Weights change by yearly regime classification
* Tilts toward assets that historically fit each environment
* Exploits best performers per regime, tests whether regime information adds value
* **Final value: $65,784 - 8.74% CAGR**

The regime-aware strategy produced **2× the terminal wealth** of the equal-weight benchmark over 50 years.

---
class: top, left

# Risk and Return Tradeoff

Regime-aware allocation improved returns and drawdown, but carried higher annual volatility.

**Annualized Return: 8.74%** (+1.51 pts vs. static equal-weight)
* A meaningful improvement compounded over 50 years - producing $65,784 vs $32,802.

**Annualized Volatility: 9.91%** (higher year-to-year variation)
* Active regime-switching introduces additional short-term uncertainty.
* The price paid for superior long-run compounding.

**Max Drawdown: −4.11%** (smallest loss in back-test)
* By rotating away from underperforming assets before difficult periods, the strategy significantly limits the depth of losses vs. the static benchmark.
* Higher return *and* better downside protection - the core result.

# Seeking Alpha with Alternative Data
## Using Retail Sentiment to Find an Edge

---





# Introduction: The Quest for Alpha

**The Modern Market Landscape**
* Traditional financial data (earnings, PE ratios, SEC filings) is instantly priced in by institutional algorithms.
* Generating *Alpha* (excess return) requires finding an edge where others aren't looking.

**The Shift to Alternative Data**
* Satellite imagery, credit card transactions, and web traffic are the new frontiers for hedge funds.
* Goal: Exploit **Information Asymmetry** before the broader market reacts.

**Behavioral Inefficiencies**
* Markets are not perfectly rational. Retail momentum and collective human psychology create measurable, exploitable price distortions.

---

# The Edge in the Echo Chamber

**Why Small Online Forums?**
* Mega-forums (like mainstream news) are heavily monitored by institutional algorithms and often deal with megacap stocks that are unlikely to move much due to punditry.
* Niche retail trading communities serve as incubators for chaotic large scale price shifts ($GME, $BYND, $NBIS).
*Potential market edges may exist but not be scalable meaning large firms responsibly for managing billions or trillions in assets will overlook the ability to make thousands.

**The Hypothesis**
* By aggregating localized, high-conviction retail sentiment, we can front-run retail momentum before it translates into institutional volume.
* **The Challenge:** How do we systematically extract structured financial signals from highly unstructured, chaotic internet slang?

---

# Phase 1: Data Acquisition: Scrapping

**The API Problem**
* The Official Reddit API is heavily rate-limited, expensive, and requires petitioning for a license.

**Scrapping Reddit Trading Communities**
* Built a custom, asynchronous Python scraper to hit raw `.json` endpoints.
* **Rolling-Rate-Limit Evasion:** Implemented a fault-tolerant `immortal-request` function that detects `429 Too Many Requests` errors, sleeps dynamically, and mimics human browser headers to bypass Reddit's firewall allowing the script to be robust against errors, internet outages, and sleeping.
* **Micro-Batching:** Data is saved instantly to local `.csv` files to prevent data loss during long scraping marathons.

**Results**
* We achieve perfect accuracy when scrapping posts, saving the entirety of titles, body text, comment, date, upvotes, and link to our data repository.

---

# Phase 2: The NLP Bottleneck: User Sentiment

**The Failure of Traditional Methods**
* Standard NLP libraries (VADER, finBERT) fail at financial slang. (e.g., "This stock is sick" = Negative to VADER, Positive to retail). And "$CMG to the Moon" is unrecognizable by open access institutional tools like finBERT.
* Regex ticker extraction fails at common words. (e.g., "Sandisk is a strong buy." or "OP is stupid, META is at ATH!").

---

#Phase 2B: The NLP Solution: LLMs

**The Localized LLM Solution**
* Deployed a locally hosted 14-Billion parameter Large Language Model (Qwen 2.5).
* **Why Local?** Zero API costs, absolute privacy, and total control over generation constraints (Only Json).
* The LLM acts as a structured extraction engine, understanding context, detecting sarcasm, and outputting clean JSON `[Ticker, Sentiment]` pairs while aggressively rejecting hallucinations. The 14-Billion parameter model makes less errors then the old traditional sentiment and Regex approach.

**Results**
* Added to our csv: Sentiment classified as "POSITIVE", "NEGAITVE", or "NEUTRAL"
* stock ticker symbol ($META, $TSLA, $APPL)

---

# Phase 3: Financial Grounding

**Calculating Market-Relative Alpha**
* Merging alternative data with empirical market reality using the `yfinance` API.

**The Pipeline**
1. Read the parsed daily signals from the LLM.
2. Query Yahoo Finance for the asset's price on the exact date of the post.
3. Track the asset's trajectory over 1-Day, 1-Week, and 1-Month intervals.
4. **Benchmark:** Subtract the S&amp;P 500 (SPY) return over the exact same period to isolate the stock's true Alpha.

---

# The Reality Check: Statistical Biases

**1. Look-Ahead Bias (The Upvote Problem)**
* *The Error:* Scraping by "Top of the Year" meant sorting by future outcomes. A stock that went bankrupt had 0 upvotes. A stock that soared 500% got upvoted *after* the fact. 
* *The Fix:* Forcing the pipeline to scrape strictly chronologically by "New."
* Originally, we wanted easy access to historical Reddit posts which is why we shied away from "New". Reddit only saves 1000 posts by each tab.

**2. Survivorship Bias (The Bankruptcy Problem)**
* *The Error:* Yahoo Finance purges delisted/bankrupt companies. The backtest silently dropped these `-100%` losses, artificially inflating the win rate of the "survivors."
* *The Fix:* Engineered a "Lock-Box" memory system that explicitly penalizes the portfolio with total losses if a tracked ticker disappears from the exchange. Tracking in real-time allows us to track when and if these stocks go bankrupt.

# Future Architecture &amp; Forward-Testing

**Scaling the Operation**
* Transitioning from historical backfilling to a lightweight, daily Scrape job handled by Windows Task Scheduler.
* Processing strictly chronological, 48-hour data windows to guarantee zero look-ahead bias.

**Live Forward-Testing (The Ultimate Proof)**
* Historical backtests are inherently flawed. 
* **Next Step:** Connecting the output of the Alpha pipeline to the **Alpaca Trading API**.
* Deploying a "Paper Trading" bot to execute these momentum signals live with fake capital, measuring actual market slippage and real-time execution dynamics before risking a single dollar.

# Finding the Edge: The Liquidity Variable

**The Problem:** Traditional fundamental data (like Yahoo Finance Market Cap) is fragile. 35% of the initial dataset was lost to "Unknown" sizes due to delistings, bankruptcies, or ETF classifications.

**The Quantitative Solution:** We created a historical liquidity proxy to perfectly map tradeability at the time of the post: **Average Daily Dollar Volume (ADDV)**.

<div style="text-align:center;margin:18px 0 14px;">
  <span style="display:inline-block;background:#f4faf8;border:2px solid #1b6b3a;border-radius:6px;padding:10px 32px;font-size:1.25em;font-family:'Georgia',serif;color:#1b6b3a;letter-spacing:0.03em;">
    <i>ADDV</i> &nbsp;=&nbsp; Median(&thinsp;<i>Volume</i> &times; <i>Close Price</i>&thinsp;)
  </span>
</div>

By calculating this over the previous year of trading, we defined three true liquidity tiers:

* **Tier 1 (Large/Highly Liquid):** &gt; $50 Million traded per day. (Negligible friction: ~0.05%)
* **Tier 2 (Mid/Liquid):** $5M to $50 Million per day. (Standard friction: ~0.20%)
* **Tier 3 (Small/Illiquid):** &lt; $5 Million per day. (Massive slippage, high borrow fees)

This eliminated the 35% data leak, reducing "Unknowns" to just 1.5%, providing a bulletproof baseline for friction cost analysis.

# The Short-Sellers' Mirage

Initial backtests revealed a staggering **+70.41% return (70.3% win rate)** when shorting Small-Cap stocks with negative Reddit sentiment. 

However, market mechanics render this Alpha **structurally un-extractable** due to friction:

1. **The "Locate" Problem:** When retail panic hits a $5M ADDV micro-cap, shares become unavailable. Brokers will outright reject `SELL-SHORT` orders due to "No Locates."
2. **Extortionate Borrow Fees:** If located, these assets are designated Hard-To-Borrow (HTB), carrying annualized interest fees ranging from 50% to 200%, instantly consuming the gross Alpha.
3. **The Liquidity Tax:** Market makers widen Bid-Ask spreads on illiquid stocks during panic, routinely enforcing a 3% to 5% spread tax on entry and exit.

**Takeaway:** Alpha only exists here *because* institutional capital refuses to pay the friction costs to extract it.

class: top, left

# Trading Small-Caps: The Friction Floor

Can we extract Alpha from Small-Caps on the **Long** side (where borrow fees don't exist)? 

Testing `POSITIVE` sentiment Small-Caps on `r/stock-picks` yielded massive paper returns: **+84.49% over 2-weeks**. But problematizing this with real-world execution friction reveals a razor-thin margin of survival:

* **At 0.5% Friction (Generous):** Strategy soars.
* **At 3.0% Friction (Realistic limit orders):** Strategy survives and remains highly profitable.
* **At 5.0% Friction (Market order slippage):** Alpha is completely obliterated.

**The Execution Mandate:** Live trading this strategy requires a programmatic **"Spread Shield."** Algorithms must calculate the live Level-1 quote spread and abort the trade if it exceeds 6%, strictly utilizing Mid-Point Limit Orders to prevent market makers from devouring the edge.

**The Contrast:** `r/stock-picks` generated +8.84% Alpha on the exact same cohort (Small Cap/Positive), proving a legitimate edge. 

**Conclusion:** The 516 signals on `r/pennystocks` mathematically prove a coordinated scam. "Positive" posts are heavily utilized by early entrants attempting to manufacture exit liquidity from naive retail traders, leaving them holding assets that rapidly decay relative to the market.
